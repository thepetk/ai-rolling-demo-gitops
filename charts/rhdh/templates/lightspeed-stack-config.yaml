kind: ConfigMap
apiVersion: v1
metadata:
  name: lightspeed-stack
  namespace: {{ .Release.Namespace }}
data:
  lightspeed-stack.yaml: |
    name: lightspeed-core-stack
    service:
      host: 0.0.0.0
      port: 8080
      auth_enabled: false
      workers: 1
      color_log: true
      access_log: true
    llama_stack:
      use_as_library_client: true
      library_client_config_path: /app-root/config.yaml
    llm_judge:
      enabled: true
      model: "vllm/redhataillama-31-8b-instruct"
      sampling_rate: 0.1
    user_data_collection:
      feedback_enabled: true
      feedback_storage: '/tmp/data/feedback'
    authentication:
      module: 'noop'
    conversation_cache:
      type: 'sqlite'
      sqlite:
        db_path: '/tmp/cache.db'
    customization:
      profile_path: '/app-root/rhdh-profile.py'
    mcp_servers:
      - name: mcp-integration-tools
        provider_id: "model-context-protocol"
        url: "http://{{ .Release.Name }}-backstage.{{ .Release.Namespace }}.svc.cluster.local:7007/api/mcp-actions/v1"
        authorization_headers:
          Authorization: "/app-root/lightspeed-stack/mcp-auth-token"
