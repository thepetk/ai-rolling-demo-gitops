apiVersion: batch/v1
kind: Job
metadata:
  name: update-deployment-containers
spec:
  template:
    spec:
      containers:
        - name: patch-deployment
          image: quay.io/redhat-ai-dev/utils:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              DEPLOYMENT="rolling-demo-backstage"
              NAMESPACE="rolling-demo-ns"

              echo "Waiting deployment ${DEPLOYMENT} to be available.."
              kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=600s

              echo "Checking if containers already exist in deployment..."
              CONTAINERS=$(kubectl get deployment $DEPLOYMENT -n $NAMESPACE -o json | jq '.spec.template.spec.containers[] | .name')

              # Container Specs (Location, Storage-REST and RHOAI Normalizer)
              LOCATION_CONTAINER='{
                "name": "location",
                "env": [
                  { "name": "NORMALIZER_FORMAT", "value": "JsonArrayFormat" },
                  { "name": "POD_IP", "valueFrom": { "fieldRef": { "fieldPath": "status.podIP" } } },
                  { "name": "POD_NAMESPACE", "valueFrom": { "fieldRef": { "fieldPath": "metadata.namespace" } } }
                ],
                "envFrom": [
                  { "secretRef": { "name": "rhdh-rhoai-bridge-token" } },
                  { "secretRef": { "name": "ai-rh-developer-hub-env" } }
                ],
                "image": "quay.io/redhat-ai-dev/model-catalog-location-service:latest",
                "imagePullPolicy": "Always",
                "ports": [{ "containerPort": 9090, "name": "location", "protocol": "TCP" }],
                "startupProbe": {
                  "httpGet": { "path": "/.backstage/health/v1/liveness", "port": 7007, "scheme": "HTTP" },
                  "initialDelaySeconds": 30,
                  "timeoutSeconds": 4,
                  "periodSeconds": 20,
                  "successThreshold": 1,
                  "failureThreshold": 3
                },
                "volumeMounts": [{ "mountPath": "/opt/app-root/src/dynamic-plugins-root", "name": "dynamic-plugins-root" }],
                "workingDir": "/opt/app-root/src"
              }'

              STORAGE_REST_CONTAINER='{
                "name": "storage-rest",
                "env": [
                  { "name": "NORMALIZER_FORMAT", "value": "JsonArrayFormat" },
                  { "name": "STORAGE_TYPE", "value": "ConfigMap" },
                  { "name": "PUSH_TO_RHDH", "value": "False"},
                  { "name": "POD_IP", "valueFrom": { "fieldRef": { "fieldPath": "status.podIP" } } },
                  { "name": "POD_NAMESPACE", "valueFrom": { "fieldRef": { "fieldPath": "metadata.namespace" } } }
                ],
                "envFrom": [
                  { "secretRef": { "name": "rhdh-rhoai-bridge-token" } },
                  { "secretRef": { "name": "ai-rh-developer-hub-env" } }
                ],
                "image": "quay.io/redhat-ai-dev/model-catalog-storage-rest:latest",
                "imagePullPolicy": "Always",
                "ports": [{ "containerPort": 9090, "name": "location", "protocol": "TCP" }],
                "volumeMounts": [{ "mountPath": "/opt/app-root/src/dynamic-plugins-root", "name": "dynamic-plugins-root" }],
                "workingDir": "/opt/app-root/src"
              }'

              RHOAI_NORMALIZER_CONTAINER='{
                "name": "rhoai-normalizer",
                "env": [
                  { "name": "NORMALIZER_FORMAT", "value": "JsonArrayFormat" },
                  { "name": "MR_ROUTE", "value": "rhoai-model-registries-modelregistry-public-rest" },
                  { "name": "POLLING_INTERVAL", "value": "10s"},
                  { "name": "POD_IP", "valueFrom": { "fieldRef": { "fieldPath": "status.podIP" } } },
                  { "name": "POD_NAMESPACE", "valueFrom": { "fieldRef": { "fieldPath": "metadata.namespace" } } }
                ],
                "envFrom": [
                  { "secretRef": { "name": "rhdh-rhoai-bridge-token" } },
                  { "secretRef": { "name": "ai-rh-developer-hub-env" } }
                ],
                "image": "quay.io/redhat-ai-dev/model-catalog-rhoai-normalizer:latest",
                "imagePullPolicy": "Always",
                "ports": [{ "containerPort": 9090, "name": "location", "protocol": "TCP" }],
                "volumeMounts": [{ "mountPath": "/opt/app-root/src/dynamic-plugins-root", "name": "dynamic-plugins-root" }],
                "workingDir": "/opt/app-root/src"
              }'

              # Helper string to compose the command
              PATCH_OPS="["

              # For each one of the containers we check if they exist and the action
              # is then defined (replace vs add)
              if echo "$CONTAINERS" | grep -q '"location"'; then
                echo "Container 'location' already exists, replacing..."
                LOCATION_INDEX=$(kubectl get deployment $DEPLOYMENT -n $NAMESPACE -o json | jq '.spec.template.spec.containers | map(.name == "location") | index(true)')
                PATCH_OPS+="{ \"op\": \"replace\", \"path\": \"/spec/template/spec/containers/$LOCATION_INDEX\", \"value\": $LOCATION_CONTAINER },"
              else
                echo "Container 'location' does not exist, adding..."
                PATCH_OPS+="{ \"op\": \"add\", \"path\": \"/spec/template/spec/containers/-\", \"value\": $LOCATION_CONTAINER },"
              fi

              if echo "$CONTAINERS" | grep -q '"storage-rest"'; then
                echo "Container 'storage-rest' already exists, replacing..."
                STORAGE_REST_INDEX=$(kubectl get deployment $DEPLOYMENT -n $NAMESPACE -o json | jq '.spec.template.spec.containers | map(.name == "storage-rest") | index(true)')
                PATCH_OPS+="{ \"op\": \"replace\", \"path\": \"/spec/template/spec/containers/$STORAGE_REST_INDEX\", \"value\": $STORAGE_REST_CONTAINER },"
              else
                echo "Container 'storage-rest' does not exist, adding..."
                PATCH_OPS+="{ \"op\": \"add\", \"path\": \"/spec/template/spec/containers/-\", \"value\": $STORAGE_REST_CONTAINER },"
              fi

              # Check and handle "rhoai-normalizer" container
              if echo "$CONTAINERS" | grep -q '"rhoai-normalizer"'; then
                echo "Container 'rhoai-normalizer' already exists, replacing..."
                RHOAI_NORMALIZER_INDEX=$(kubectl get deployment $DEPLOYMENT -n $NAMESPACE -o json | jq '.spec.template.spec.containers | map(.name == "rhoai-normalizer") | index(true)')
                PATCH_OPS+="{ \"op\": \"replace\", \"path\": \"/spec/template/spec/containers/$RHOAI_NORMALIZER_INDEX\", \"value\": $RHOAI_NORMALIZER_CONTAINER },"
              else
                echo "Container 'rhoai-normalizer' does not exist, adding..."
                PATCH_OPS+="{ \"op\": \"add\", \"path\": \"/spec/template/spec/containers/-\", \"value\": $RHOAI_NORMALIZER_CONTAINER },"
              fi

              # Finalize the json produced by the job
              # small catch is to remove the trailing comma.
              PATCH_OPS=$(echo "$PATCH_OPS" | sed 's/,$//')
              PATCH_OPS+="]"

              echo "Applied patch in detail:"
              echo "$PATCH_OPS" | jq '.'

              echo "Patching.."
              kubectl patch deployment $DEPLOYMENT -n $NAMESPACE --type='json' -p="$PATCH_OPS"
      restartPolicy: OnFailure
  backoffLimit: 4
