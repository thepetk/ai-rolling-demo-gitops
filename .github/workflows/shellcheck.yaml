name: ShellCheck

on:
    pull_request:
    push:
        branches:
            - main
            - development

jobs:
    shellcheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run ShellCheck
              uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
              with:
                  scandir: "."
                  ignore_paths: "tests"
